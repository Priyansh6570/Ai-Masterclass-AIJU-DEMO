<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:inline-flex;flex-wrap:wrap;align-items:center;gap:8px 9px;line-height:1;">
  <img src="assets/sis-logo.png" alt="Sage International School" style="height:{{ size }}px;width:auto;display:block;flex-shrink:0;">
  <span style="font-family:'Sora';font-weight:800;font-size:{{ fs }}px;letter-spacing:.03em;color:{{ ink }};">SIS</span>
  <span style="font-family:'Sora';font-weight:300;font-size:{{ xs }}px;color:{{ muted }};margin:0 1px;">×</span>
  <img src="assets/aiju-logo.png" alt="BeInfinityBuddy" style="height:{{ size }}px;width:auto;display:block;flex-shrink:0;">
  <span style="font-family:'Sora';font-weight:800;font-size:{{ fs }}px;letter-spacing:.005em;color:{{ ink }};white-space:nowrap;">{{ label }}</span>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:320,&quot;height&quot;:52},&quot;size&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:32,&quot;tsType&quot;:&quot;number&quot;},&quot;fs&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:14,&quot;tsType&quot;:&quot;number&quot;},&quot;xs&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:16,&quot;tsType&quot;:&quot;number&quot;},&quot;ink&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#0F1B2D&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;muted&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#8A99B5&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;BeInfinityBuddy&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const size = this.props.size ?? 32;
    return {
      size,
      fs: this.props.fs ?? 14,
      xs: this.props.xs ?? Math.round((this.props.fs ?? 14) * 1.15),
      ink: this.props.ink ?? '#0F1B2D',
      muted: this.props.muted ?? '#8A99B5',
      label: this.props.label ?? 'BeInfinityBuddy',
    };
  }
}
</script>
</body>
</html>
